server.port=8083
spring.application.name=e-banking-card-service
spring.datasource.url=jdbc:mysql://localhost:3306/ebanking_cards?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=ebanking
spring.datasource.password=ebanking123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
ebanking.idle.enabled=false
ebanking.services.account-url=http://localhost:8082
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
management.endpoints.web.exposure.include=health,info
logging.level.com.ebanking.card=DEBUG
