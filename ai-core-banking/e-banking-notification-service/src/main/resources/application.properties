server.port=8086
spring.application.name=e-banking-notification-service

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/ebanking_notifications?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=ebanking
spring.datasource.password=ebanking123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA & Flyway
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Mailhog SMTP Configuration (Docker Compose)
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

ebanking.idle.enabled=false

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=health,info
logging.level.com.ebanking.notification=DEBUG
