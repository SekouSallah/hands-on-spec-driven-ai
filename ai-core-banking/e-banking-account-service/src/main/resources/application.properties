server.port=8082
spring.application.name=e-banking-account-service

spring.datasource.url=jdbc:mysql://localhost:3306/ebanking_accounts?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=ebanking
spring.datasource.password=ebanking123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

ebanking.jwt.secret=ai-core-banking-jwt-secret-key-for-workshop-2024-must-be-at-least-256-bits-long
ebanking.jwt.expiration=86400000
ebanking.idle.enabled=false

# Customer Service URL for inter-service calls
ebanking.services.customer-url=http://localhost:8081

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

logging.level.com.ebanking.account=DEBUG
