events {
    worker_connections 1024;
}

http {
    # ============================
    # Upstream Microservices
    # ============================

    upstream customer_service {
        server customer-service:8081;
    }

    upstream account_service {
        server account-service:8082;
    }

    upstream card_service {
        server card-service:8083;
    }

    upstream transaction_service {
        server transaction-service:8084;
    }

    upstream fraud_service {
        server fraud-service:8085;
    }

    upstream notification_service {
        server notification-service:8086;
    }

    # ============================
    # API Gateway
    # ============================

    server {
        listen 80;
        server_name localhost;

        # -- Health check --
        location /health {
            return 200 '{"status":"UP"}';
            add_header Content-Type application/json;
        }

        # -- Customer Service --
        location /api/customers {
            proxy_pass http://customer_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -- Account Service --
        location /api/accounts {
            proxy_pass http://account_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -- Card Service --
        location /api/cards {
            proxy_pass http://card_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -- Transaction Service --
        location /api/transactions {
            proxy_pass http://transaction_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -- Fraud Service --
        location /api/fraud {
            proxy_pass http://fraud_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -- Notification Service --
        location /api/notifications {
            proxy_pass http://notification_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -- Mailhog Web UI --
        location /mailhog/ {
            proxy_pass http://mailhog:8025/;
            proxy_set_header Host $host;
        }
    }
}
