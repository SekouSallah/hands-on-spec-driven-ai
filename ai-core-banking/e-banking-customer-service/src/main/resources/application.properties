# ============================
# Server Configuration
# ============================
server.port=8081
spring.application.name=e-banking-customer-service

# ============================
# Database Configuration
# ============================
spring.datasource.url=jdbc:mysql://localhost:3306/ebanking_customers?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=ebanking
spring.datasource.password=ebanking123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================
# JPA / Hibernate
# ============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================
# Flyway
# ============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ============================
# JWT Configuration
# ============================
ebanking.jwt.secret=ai-core-banking-jwt-secret-key-for-workshop-2024-must-be-at-least-256-bits-long
ebanking.jwt.expiration=86400000

# ============================
# Idle Mode
# ============================
ebanking.idle.enabled=false

# ============================
# OpenAPI / Swagger
# ============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# ============================
# Actuator
# ============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ============================
# Logging
# ============================
logging.level.com.ebanking.customer=DEBUG
logging.level.org.springframework.security=INFO
