# ============================
# Test Configuration
# ============================
spring.application.name=e-banking-customer-service-test

# H2 in-memory database for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MYSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Flyway for tests (using JPA auto-DDL)
spring.flyway.enabled=false

# JWT
ebanking.jwt.secret=test-jwt-secret-key-for-unit-tests-must-be-at-least-256-bits-long-enough
ebanking.jwt.expiration=86400000

# Idle Mode
ebanking.idle.enabled=false

# Logging
logging.level.com.ebanking.customer=DEBUG
